name: auto-approve-and-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  approve-and-merge:
    name: 自动批准并合并
    runs-on: ubuntu-latest

    if: ${{ github.event.pull_request.draft == false }}

    steps:
      - name: Checkout trusted scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Auto approve and merge if allowed
        run: node scripts/auto_approve.js
        env:
          BOT_TOKEN: ${{ secrets.JOURNAL_BOT_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
