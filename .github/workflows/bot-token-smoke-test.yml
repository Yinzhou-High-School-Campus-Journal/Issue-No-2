name: Bot Token Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check bot token identity and repo access
        env:
          GH_TOKEN: ${{ secrets.JOURNAL_BOT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Bot account:"
          gh api user --jq '.login'

          echo "Repository permission:"
          gh api "repos/$REPO" --jq '.permissions'
